<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIFUKU PASS 管理画面</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    background: #f2f0ec;
    color: #2c2c2c;
  }

  /* ---------- パスワードゲート ---------- */
  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2c2c2c;
  }
  .gate-box {
    background: #fff;
    border-radius: 12px;
    padding: 36px 32px;
    width: 320px;
    text-align: center;
  }
  .gate-box h1 {
    font-size: 16px;
    color: #3d6b4f;
    margin-bottom: 4px;
    letter-spacing: 0.06em;
  }
  .gate-box p {
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
  }
  .gate-box input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d6d0c4;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .gate-box button {
    width: 100%;
    padding: 10px;
    background: #3d6b4f;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .gate-error {
    color: #c0392b;
    font-size: 12px;
    margin-top: 10px;
    min-height: 16px;
  }

  /* ---------- 管理画面本体 ---------- */
  #app { display: none; }

  .topbar {
    background: #fff;
    border-bottom: 1px solid #d6d0c4;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    flex-wrap: wrap;
    gap: 10px;
  }
  .topbar h1 {
    font-size: 15px;
    font-weight: 800;
    color: #3d6b4f;
    letter-spacing: 0.06em;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #555;
    padding-left: 12px;
    border-left: 1.5px solid #e0dace;
  }
  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #d6d0c4;
    background: #fff;
    color: #555;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .tab-btn.active {
    background: #3d6b4f;
    border-color: #3d6b4f;
    color: #fff;
  }

  .panel { display: none; padding: 20px; max-width: 920px; margin: 0 auto; }
  .panel.active { display: block; }

  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .panel-head h2 { font-size: 15px; font-weight: 700; }

  .btn {
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: #3d6b4f; color: #fff; }
  .btn-outline { background: #fff; border: 1.5px solid #d6d0c4; color: #444; }
  .btn-danger { background: #fff; border: 1.5px solid #e0a8a0; color: #c0392b; }
  .btn-small { padding: 5px 10px; font-size: 11px; }

  /* ---------- 体験内容一覧 ---------- */
  .exp-list { display: flex; flex-direction: column; gap: 10px; }
  .exp-row {
    background: #fff;
    border: 1.5px solid #d6d0c4;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .exp-row img {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: 8px;
    background: #e8e4dc;
    flex-shrink: 0;
  }
  .exp-row .no-img {
    width: 56px; height: 56px;
    border-radius: 8px;
    background: #e8e4dc;
    display: flex; align-items: center; justify-content: center;
    color: #a08878;
    flex-shrink: 0;
  }
  .exp-row .info { flex: 1; min-width: 0; }
  .exp-row .info .title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .exp-row .info .meta { font-size: 11px; color: #888; }
  .exp-row .actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
  }
  .badge-on { background: #e3efe6; color: #3d6b4f; }
  .badge-off { background: #f0ebe4; color: #a08878; }

  .toggle-switch {
    width: 38px; height: 22px;
    border-radius: 12px;
    background: #d6d0c4;
    position: relative;
    cursor: pointer;
    border: none;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: #3d6b4f; }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.15s;
  }
  .toggle-switch.on::after { transform: translateX(16px); }

  /* ---------- フォームモーダル ---------- */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 24px 12px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 480px;
    padding: 22px;
  }
  .modal h3 { font-size: 15px; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: #666;
    margin-bottom: 4px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #d6d0c4;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
  }
  .field .static-text {
    font-size: 13px;
    color: #444;
    padding: 8px 0 2px;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
  }

  /* ---------- 画像アップロード ---------- */
  .upload-area {
    border: 2px dashed #d6d0c4;
    border-radius: 10px;
    background: #faf8f5;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .upload-area.dragover {
    border-color: #3d6b4f;
    background: #e3efe6;
  }
  .upload-placeholder {
    text-align: center;
    color: #8a8070;
    font-size: 12px;
    padding: 16px;
  }
  .upload-icon { font-size: 24px; margin-bottom: 6px; }
  .upload-preview {
    width: 100%;
    position: relative;
  }
  .upload-preview img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    display: block;
  }
  .upload-remove {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .upload-status {
    font-size: 11px;
    color: #3d6b4f;
    margin-top: 6px;
    min-height: 14px;
  }
  .upload-status.error { color: #c0392b; }

  /* ---------- 予約一覧 ---------- */
  .panel-note {
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
  }
  .res-list { display: flex; flex-direction: column; gap: 8px; }
  .res-row {
    background: #fff;
    border: 1.5px solid #d6d0c4;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .res-row .date { font-weight: 700; width: 90px; flex-shrink: 0; }
  .res-row .time { color: #555; width: 60px; flex-shrink: 0; }
  .res-row .exp-title { width: 200px; color: #333; flex-shrink: 0; }
  .res-row .name { flex: 1; min-width: 100px; color: #444; }
  .res-row .count {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    background: #f0ebe4;
    color: #3d6b4f;
  }

  /* ---------- ユーザー管理 ---------- */
  .user-list { display: flex; flex-direction: column; gap: 10px; }
  .user-row {
    background: #fff;
    border: 1.5px solid #d6d0c4;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .user-row .info { flex: 1; }
  .user-row .info .name { font-size: 14px; font-weight: 700; }
  .user-row .info .meta { font-size: 11px; color: #888; margin-top: 2px; }
  .role-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }
  .role-badge.admin { background: #f5e3e0; color: #c0392b; }
  .role-badge.staff { background: #e3efe6; color: #3d6b4f; }

  /* ---------- 担当者リスト（モーダル内） ---------- */
  .staff-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .staff-list .empty { padding: 14px; font-size: 12px; }
  .staff-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f5f2ec;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }
  .staff-chip button {
    background: none;
    border: none;
    color: #c0392b;
    font-size: 11px;
    cursor: pointer;
  }

  /* ---------- スマホ対応 ---------- */
  @media (max-width: 680px) {
    .topbar {
      flex-direction: column;
      align-items: stretch;
      padding: 12px 14px;
      gap: 10px;
    }
    .topbar h1 { font-size: 13px; text-align: center; }
    .topbar-right {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .tabs {
      justify-content: center;
    }
    .tab-btn {
      flex: 1 1 auto;
      text-align: center;
      padding: 8px 10px;
      font-size: 11px;
    }
    .user-info {
      justify-content: space-between;
      border-left: none;
      border-top: 1.5px solid #e0dace;
      padding-left: 0;
      padding-top: 8px;
    }

    .panel { padding: 14px; }
    .panel-head {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .panel-head h2 { text-align: center; }
    .panel-head .btn { width: 100%; }

    /* 体験内容の行 */
    .exp-row {
      flex-wrap: wrap;
      padding: 12px;
    }
    .exp-row .info {
      flex: 1 1 100%;
      order: 2;
    }
    .exp-row img,
    .exp-row .no-img {
      width: 44px; height: 44px;
    }
    .exp-row .actions {
      flex: 1 1 100%;
      order: 3;
      flex-wrap: wrap;
      justify-content: flex-start;
      margin-top: 4px;
    }

    /* 予約枠ツールバー・行 */
    .slot-toolbar {
      flex-direction: column;
      align-items: stretch;
    }
    .slot-toolbar select,
    .slot-toolbar input {
      width: 100%;
    }
    .slot-row {
      flex-wrap: wrap;
      gap: 6px 10px;
    }
    .slot-row .date { width: auto; }
    .slot-row .time { width: auto; }
    .slot-row .exp-title {
      flex: 1 1 100%;
      order: 3;
    }
    .slot-row .cap { order: 4; }

    /* 予約一覧 */
    .res-row { flex-wrap: wrap; gap: 4px 10px; }
    .res-row .date { width: auto; }
    .res-row .time { width: auto; }
    .res-row .exp-title { flex: 1 1 100%; width: auto; order: 3; }
    .res-row .name { flex: 1 1 100%; order: 4; }

    /* ユーザー一覧 */
    .user-row {
      flex-wrap: wrap;
      gap: 10px;
    }
    .user-row .actions {
      flex: 1 1 100%;
      display: flex;
      gap: 6px;
    }
    .user-row .actions .btn { flex: 1; }

    /* モーダル */
    .modal-bg { padding: 0; align-items: stretch; }
    .modal {
      max-width: 100%;
      width: 100%;
      min-height: 100%;
      border-radius: 0;
      padding: 18px 16px 28px;
    }
    .modal-wide { max-width: 100%; }
    .field-row { flex-direction: column; gap: 0; }

    /* カレンダー */
    .cal-day { font-size: 11px; }
    .cal-weekdays { font-size: 9px; }
  }

  /* ---------- 予約枠タブ ---------- */
  .slot-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .slot-toolbar select, .slot-toolbar input {
    padding: 8px 10px;
    border: 1.5px solid #d6d0c4;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
  }

  .slot-list { display: flex; flex-direction: column; gap: 8px; }
  .slot-row {
    background: #fff;
    border: 1.5px solid #d6d0c4;
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .slot-row .date { font-weight: 700; width: 92px; flex-shrink: 0; }
  .slot-row .time { color: #555; width: 110px; flex-shrink: 0; }
  .slot-row .exp-title { flex: 1; color: #333; }
  .slot-row .cap {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    background: #f0ebe4;
    color: #3d6b4f;
    flex-shrink: 0;
  }
  .slot-row .cap.full { background: #f5e3e0; color: #c0392b; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #a08878;
    font-size: 13px;
  }

  /* ---------- カレンダー（予約枠選択） ---------- */
  .modal-wide { max-width: 380px; }

  .cal-wrap {
    margin-bottom: 14px;
    border: 1.5px solid #d6d0c4;
    border-radius: 10px;
    padding: 12px;
    background: #faf8f5;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #3d6b4f;
  }
  .cal-nav {
    background: none;
    border: none;
    font-size: 18px;
    color: #3d6b4f;
    cursor: pointer;
    padding: 0 8px;
    line-height: 1;
  }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 10px;
    color: #999;
    margin-bottom: 4px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    background: #fff;
    border: 1.5px solid transparent;
    color: #333;
    user-select: none;
  }
  .cal-day.empty-cell { cursor: default; background: transparent; }
  .cal-day.past { color: #ccc; cursor: not-allowed; background: transparent; }
  .cal-day.selected {
    background: #3d6b4f;
    color: #fff;
    font-weight: 700;
  }
  .cal-day.today:not(.selected) {
    border-color: #3d6b4f;
    font-weight: 700;
  }
  .cal-selected-info {
    margin-top: 10px;
    font-size: 11px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .link-btn {
    background: none;
    border: none;
    color: #c0392b;
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
</style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="gate">
    <div class="gate-box">
      <h1>ARIFUKU PASS</h1>
      <p>管理画面 — ログインしてください</p>
      <input type="text" id="gate-username" placeholder="ユーザー名" autocomplete="username">
      <input type="password" id="gate-pw" placeholder="パスワード" autocomplete="current-password">
      <button onclick="checkPassword()">ログイン</button>
      <div class="gate-error" id="gate-error"></div>
    </div>
  </div>

  <!-- 管理画面本体 -->
  <div id="app">
    <div class="topbar">
      <h1>ARIFUKU PASS 管理画面</h1>
      <div class="topbar-right">
        <div class="tabs">
          <button class="tab-btn active" data-tab="experiences">体験内容</button>
          <button class="tab-btn" data-tab="slots">予約枠</button>
          <button class="tab-btn" data-tab="reservations">予約一覧</button>
          <button class="tab-btn" id="tab-users-btn" data-tab="users" style="display:none;">ユーザー管理</button>
        </div>
        <div class="user-info">
          <span id="current-user-label"></span>
          <button class="btn btn-outline btn-small" onclick="logout()">ログアウト</button>
        </div>
      </div>
    </div>

    <!-- 体験内容パネル -->
    <div class="panel active" id="panel-experiences">
      <div class="panel-head">
        <h2>体験内容一覧</h2>
        <button class="btn btn-primary" id="exp-new-btn" onclick="openExpForm()">＋ 新規追加</button>
      </div>
      <div class="exp-list" id="exp-list">
        <div class="empty">読み込み中...</div>
      </div>
    </div>

    <!-- 予約枠パネル -->
    <div class="panel" id="panel-slots">
      <div class="panel-head">
        <h2>予約枠管理</h2>
        <button class="btn btn-primary" onclick="openSlotForm()">＋ 枠を追加</button>
      </div>
      <div class="slot-toolbar">
        <input type="month" id="slot-month">
        <select id="slot-filter-exp"><option value="">すべての体験</option></select>
      </div>
      <div class="slot-list" id="slot-list">
        <div class="empty">読み込み中...</div>
      </div>
    </div>

    <!-- 予約一覧パネル -->
    <div class="panel" id="panel-reservations">
      <div class="panel-head">
        <h2>予約一覧</h2>
      </div>
      <p class="panel-note" id="reservations-note"></p>
      <div class="res-list" id="res-list">
        <div class="empty">読み込み中...</div>
      </div>
    </div>

    <!-- ユーザー管理パネル（管理者のみ） -->
    <div class="panel" id="panel-users">
      <div class="panel-head">
        <h2>ユーザー管理</h2>
        <button class="btn btn-primary" onclick="openUserForm()">＋ ユーザーを追加</button>
      </div>
      <div class="user-list" id="user-list">
        <div class="empty">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 体験内容フォームモーダル -->
  <div class="modal-bg" id="exp-modal-bg">
    <div class="modal">
      <h3 id="exp-modal-title">体験内容を追加</h3>
      <input type="hidden" id="exp-id">
      <div class="field"><label>タイトル *</label><input id="exp-title"></div>
      <div class="field"><label>見出し説明</label><textarea id="exp-subtitle"></textarea></div>
      <div class="field">
        <label>画像</label>
        <div class="upload-area" id="exp-upload-area">
          <div class="upload-preview" id="exp-upload-preview" style="display:none;">
            <img id="exp-upload-preview-img" src="" alt="">
            <button type="button" class="upload-remove" onclick="removeExpImage()">×</button>
          </div>
          <div class="upload-placeholder" id="exp-upload-placeholder">
            <div class="upload-icon">📷</div>
            <div>クリック または ドラッグ＆ドロップで画像を選択</div>
          </div>
          <input type="file" id="exp-image-file" accept="image/*" style="display:none;">
        </div>
        <div class="upload-status" id="exp-upload-status"></div>
        <input type="hidden" id="exp-image">
      </div>
      <div class="field-row">
        <div class="field"><label>料金（円）</label><input id="exp-price" type="number"></div>
        <div class="field"><label>所要時間</label><input id="exp-duration" placeholder="〜30分"></div>
      </div>
      <div class="field"><label>スケジュール</label><input id="exp-schedule" placeholder="毎日10:00〜17:00"></div>
      <div class="field"><label>体験内容詳細</label><textarea id="exp-detail"></textarea></div>
      <div class="field"><label>注意事項</label><textarea id="exp-notice"></textarea></div>
      <div class="field"><label>持ち物</label><input id="exp-belongings"></div>
      <div class="field-row">
        <div class="field"><label>体験場所</label><input id="exp-place"></div>
        <div class="field"><label>集合場所</label><input id="exp-meeting"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>体験場所の住所</label><input id="exp-place-address" placeholder="島根県江津市有福温泉町..."></div>
        <div class="field"><label>集合場所の住所</label><input id="exp-meeting-address" placeholder="島根県江津市有福温泉町..."></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeExpForm()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveExperience()">保存</button>
      </div>
    </div>
  </div>

  <!-- 予約枠フォームモーダル -->
  <div class="modal-bg" id="slot-modal-bg">
    <div class="modal modal-wide">
      <h3>予約枠を追加</h3>
      <div class="field">
        <label>体験 *</label>
        <select id="slot-exp"></select>
      </div>

      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-nav" type="button" onclick="calShiftMonth(-1)">‹</button>
          <span id="cal-month-label"></span>
          <button class="cal-nav" type="button" onclick="calShiftMonth(1)">›</button>
        </div>
        <div class="cal-weekdays">
          <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-selected-info">
          選択中の日付：<span id="cal-selected-count">0</span>件
          <button type="button" class="link-btn" onclick="calClearSelection()">クリア</button>
        </div>
      </div>

      <div class="field-row">
        <div class="field"><label>開始時刻 *</label><input id="slot-start" type="time"></div>
        <div class="field"><label>終了時刻</label><input id="slot-end" type="time"></div>
      </div>
      <div class="field"><label>定員</label><input id="slot-capacity" type="number" value="1" min="1"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeSlotForm()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveSlot()">選択した日に一括登録</button>
      </div>
    </div>
  </div>

  <!-- 予約枠編集モーダル -->
  <div class="modal-bg" id="slot-edit-modal-bg">
    <div class="modal">
      <h3>予約枠を編集</h3>
      <input type="hidden" id="slot-edit-id">
      <div class="field"><label>体験</label><div class="static-text" id="slot-edit-exp-title"></div></div>
      <div class="field"><label>日付 *</label><input id="slot-edit-date" type="date"></div>
      <div class="field-row">
        <div class="field"><label>開始時刻 *</label><input id="slot-edit-start" type="time"></div>
        <div class="field"><label>終了時刻</label><input id="slot-edit-end" type="time"></div>
      </div>
      <div class="field"><label>定員</label><input id="slot-edit-capacity" type="number" min="1"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeSlotEditForm()">キャンセル</button>
        <button class="btn btn-primary" onclick="updateSlot()">保存</button>
      </div>
    </div>
  </div>

  <!-- 担当者アサインモーダル -->
  <div class="modal-bg" id="staff-modal-bg">
    <div class="modal">
      <h3 id="staff-modal-title">担当者を管理</h3>
      <input type="hidden" id="staff-exp-id">
      <div class="staff-list" id="staff-current-list"></div>
      <div class="field">
        <label>担当者を追加</label>
        <select id="staff-add-select"></select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeStaffForm()">閉じる</button>
        <button class="btn btn-primary" onclick="addStaff()">追加</button>
      </div>
    </div>
  </div>

  <!-- ユーザー作成モーダル -->
  <div class="modal-bg" id="user-modal-bg">
    <div class="modal">
      <h3>ユーザーを追加</h3>
      <div class="field"><label>ユーザー名 *</label><input id="user-username"></div>
      <div class="field"><label>パスワード *</label><input id="user-password" type="text"></div>
      <div class="field">
        <label>権限 *</label>
        <select id="user-role">
          <option value="staff">スタッフ</option>
          <option value="admin">管理者</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeUserForm()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveUser()">作成</button>
      </div>
    </div>
  </div>

  <!-- パスワード再設定モーダル -->
  <div class="modal-bg" id="reset-pw-modal-bg">
    <div class="modal">
      <h3>パスワードを再設定</h3>
      <input type="hidden" id="reset-pw-user-id">
      <div class="field"><label>ユーザー名</label><div class="static-text" id="reset-pw-username"></div></div>
      <div class="field"><label>新しいパスワード *</label><input id="reset-pw-new" type="text"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeResetPwForm()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveResetPassword()">変更</button>
      </div>
    </div>
  </div>

<script type="module">
  import {
    adminGetExperiences, adminInsertExperience, adminUpdateExperience,
    adminToggleExperienceVisibility, adminDeleteExperience,
    adminInsertSlot, adminGetSlots, adminUpdateSlot, adminDeleteSlot,
    uploadExperienceImage,
    adminLogin, adminCreateUser, adminGetUsers, adminDeleteUser, adminResetPassword,
    adminAssignStaff, adminUnassignStaff, adminGetStaffForExperience,
    adminGetMyExperiences, adminGetReservations
  } from './api.js'

  // ---------------- ログイン ----------------
  let currentUser = null  // { id, ユーザー名, 権限 }

  window.checkPassword = async function () {
    const username = document.getElementById('gate-username').value.trim()
    const password = document.getElementById('gate-pw').value
    const errorEl = document.getElementById('gate-error')
    errorEl.textContent = ''

    if (!username || !password) {
      errorEl.textContent = 'ユーザー名とパスワードを入力してください'
      return
    }

    try {
      const user = await adminLogin(username, password)
      if (!user) {
        errorEl.textContent = 'ユーザー名またはパスワードが違います'
        return
      }
      currentUser = user
      sessionStorage.setItem('arifuku_admin_user', JSON.stringify(user))
      enterApp()
    } catch (err) {
      errorEl.textContent = 'ログインに失敗しました：' + err.message
    }
  }

  window.logout = function () {
    sessionStorage.removeItem('arifuku_admin_user')
    currentUser = null
    document.getElementById('gate').style.display = 'flex'
    document.getElementById('app').style.display = 'none'
    document.getElementById('gate-username').value = ''
    document.getElementById('gate-pw').value = ''
  }

  function enterApp() {
    document.getElementById('gate').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    document.getElementById('current-user-label').textContent =
      `${currentUser.ユーザー名}（${currentUser.権限 === 'admin' ? '管理者' : 'スタッフ'}）`
    document.getElementById('tab-users-btn').style.display =
      currentUser.権限 === 'admin' ? 'inline-block' : 'none'
    document.getElementById('exp-new-btn').style.display =
      currentUser.権限 === 'admin' ? 'inline-block' : 'none'
    initApp()
  }

  // セッション内なら自動ログイン
  const savedUser = sessionStorage.getItem('arifuku_admin_user')
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser)
      enterApp()
    } catch (e) { /* ignore */ }
  }

  // ---------------- タブ切り替え ----------------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active')
      if (btn.dataset.tab === 'slots') loadSlots()
      if (btn.dataset.tab === 'reservations') loadReservations()
      if (btn.dataset.tab === 'users') loadUsers()
    })
  })

  let experiencesCache = []
  let allUsersCache = []  // 担当者選択用に全ユーザーをキャッシュ

  function initApp() {
    loadExperiences()
    const monthInput = document.getElementById('slot-month')
    const now = new Date()
    monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`
    monthInput.addEventListener('change', loadSlots)
    document.getElementById('slot-filter-exp').addEventListener('change', loadSlots)
  }

  // ---------------- 体験内容 ----------------
  async function loadExperiences() {
    const el = document.getElementById('exp-list')
    el.innerHTML = '<div class="empty">読み込み中...</div>'
    try {
      if (currentUser.権限 === 'admin') {
        experiencesCache = await adminGetExperiences()
      } else {
        experiencesCache = await adminGetMyExperiences(currentUser.id)
      }
      renderExperiences()
      fillExpSelects()
    } catch (err) {
      el.innerHTML = `<div class="empty">読み込みに失敗しました：${err.message}</div>`
    }
  }

  function renderExperiences() {
    const el = document.getElementById('exp-list')
    if (experiencesCache.length === 0) {
      el.innerHTML = '<div class="empty">体験内容がまだありません</div>'
      return
    }
    el.innerHTML = experiencesCache.map(e => `
      <div class="exp-row">
        ${e.image_url
          ? `<img src="${e.image_url}" alt="">`
          : `<div class="no-img">♨</div>`
        }
        <div class="info">
          <div class="title">${e.タイトル ?? ''}</div>
          <div class="meta">
            ${e.所要時間 ?? ''} ${e.料金 != null ? '・¥' + e.料金.toLocaleString() : ''}
            <span class="badge ${e.公開 ? 'badge-on' : 'badge-off'}">${e.公開 ? '公開中' : '非公開'}</span>
          </div>
        </div>
        <div class="actions">
          <button class="toggle-switch ${e.公開 ? 'on' : ''}" onclick="toggleVisibility('${e.id}', ${!e.公開})" title="公開切替"></button>
          ${currentUser.権限 === 'admin' ? `<button class="btn btn-outline btn-small" onclick="openStaffForm('${e.id}')">担当者</button>` : ''}
          <button class="btn btn-outline btn-small" onclick="openExpForm('${e.id}')">編集</button>
          ${currentUser.権限 === 'admin' ? `<button class="btn btn-danger btn-small" onclick="deleteExperience('${e.id}')">削除</button>` : ''}
        </div>
      </div>
    `).join('')
  }

  window.toggleVisibility = async (id, newState) => {
    try {
      await adminToggleExperienceVisibility(id, newState)
      loadExperiences()
    } catch (err) {
      alert('更新に失敗しました：' + err.message)
    }
  }

  window.deleteExperience = async (id) => {
    if (!confirm('この体験内容を削除しますか？関連する予約枠も削除されます。')) return
    try {
      await adminDeleteExperience(id)
      loadExperiences()
    } catch (err) {
      alert('削除に失敗しました：' + err.message)
    }
  }

  window.openExpForm = (id) => {
    document.getElementById('exp-modal-bg').classList.add('show')
    if (id) {
      const e = experiencesCache.find(x => x.id === id)
      document.getElementById('exp-modal-title').textContent = '体験内容を編集'
      document.getElementById('exp-id').value = e.id
      document.getElementById('exp-title').value = e.タイトル ?? ''
      document.getElementById('exp-subtitle').value = e.見出し説明 ?? ''
      document.getElementById('exp-image').value = e.image_url ?? ''
      setExpImagePreview(e.image_url)
      document.getElementById('exp-price').value = e.料金 ?? ''
      document.getElementById('exp-duration').value = e.所要時間 ?? ''
      document.getElementById('exp-schedule').value = e.スケジュール ?? ''
      document.getElementById('exp-detail').value = e.体験内容詳細 ?? ''
      document.getElementById('exp-notice').value = e.注意事項 ?? ''
      document.getElementById('exp-belongings').value = e.持ち物 ?? ''
      document.getElementById('exp-place').value = e.体験場所 ?? ''
      document.getElementById('exp-place-address').value = e.体験場所住所 ?? ''
      document.getElementById('exp-meeting').value = e.集合場所 ?? ''
      document.getElementById('exp-meeting-address').value = e.集合場所住所 ?? ''
    } else {
      document.getElementById('exp-modal-title').textContent = '体験内容を追加'
      ;['exp-id','exp-title','exp-subtitle','exp-image','exp-price','exp-duration',
        'exp-schedule','exp-detail','exp-notice','exp-belongings','exp-place','exp-place-address',
        'exp-meeting','exp-meeting-address']
        .forEach(id => document.getElementById(id).value = '')
      setExpImagePreview(null)
    }
    document.getElementById('exp-upload-status').textContent = ''
    document.getElementById('exp-upload-status').classList.remove('error')
  }

  function setExpImagePreview(url) {
    const preview = document.getElementById('exp-upload-preview')
    const previewImg = document.getElementById('exp-upload-preview-img')
    const placeholder = document.getElementById('exp-upload-placeholder')
    if (url) {
      previewImg.src = url
      preview.style.display = 'block'
      placeholder.style.display = 'none'
    } else {
      preview.style.display = 'none'
      placeholder.style.display = 'block'
    }
  }

  window.removeExpImage = (ev) => {
    if (ev) ev.stopPropagation()
    document.getElementById('exp-image').value = ''
    setExpImagePreview(null)
  }

  async function handleExpImageFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      document.getElementById('exp-upload-status').textContent = '画像ファイルを選択してください'
      document.getElementById('exp-upload-status').classList.add('error')
      return
    }
    const statusEl = document.getElementById('exp-upload-status')
    statusEl.classList.remove('error')
    statusEl.textContent = 'アップロード中...'

    // 先にプレビューだけ即時表示
    const localUrl = URL.createObjectURL(file)
    setExpImagePreview(localUrl)

    try {
      const publicUrl = await uploadExperienceImage(file)
      document.getElementById('exp-image').value = publicUrl
      setExpImagePreview(publicUrl)
      statusEl.textContent = 'アップロード完了'
    } catch (err) {
      statusEl.textContent = 'アップロード失敗：' + err.message
      statusEl.classList.add('error')
    }
  }

  // アップロードエリアのイベント設定
  const uploadArea = document.getElementById('exp-upload-area')
  const fileInput = document.getElementById('exp-image-file')

  uploadArea.addEventListener('click', () => fileInput.click())
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleExpImageFile(fileInput.files[0])
  })
  uploadArea.addEventListener('dragover', (ev) => {
    ev.preventDefault()
    uploadArea.classList.add('dragover')
  })
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover')
  })
  uploadArea.addEventListener('drop', (ev) => {
    ev.preventDefault()
    uploadArea.classList.remove('dragover')
    const file = ev.dataTransfer.files[0]
    if (file) handleExpImageFile(file)
  })

  window.closeExpForm = () => {
    document.getElementById('exp-modal-bg').classList.remove('show')
  }

  window.saveExperience = async () => {
    const id = document.getElementById('exp-id').value
    const title = document.getElementById('exp-title').value.trim()
    if (!title) { alert('タイトルを入力してください'); return }

    const payload = {
      タイトル:     title,
      見出し説明:   document.getElementById('exp-subtitle').value || null,
      image_url:    document.getElementById('exp-image').value || null,
      料金:         document.getElementById('exp-price').value ? parseInt(document.getElementById('exp-price').value) : null,
      所要時間:     document.getElementById('exp-duration').value || null,
      スケジュール: document.getElementById('exp-schedule').value || null,
      体験内容詳細: document.getElementById('exp-detail').value || null,
      注意事項:     document.getElementById('exp-notice').value || null,
      持ち物:       document.getElementById('exp-belongings').value || null,
      体験場所:     document.getElementById('exp-place').value || null,
      体験場所住所: document.getElementById('exp-place-address').value || null,
      集合場所:     document.getElementById('exp-meeting').value || null,
      集合場所住所: document.getElementById('exp-meeting-address').value || null,
    }

    try {
      if (id) {
        await adminUpdateExperience(id, payload)
      } else {
        await adminInsertExperience(payload)
      }
      closeExpForm()
      loadExperiences()
    } catch (err) {
      alert('保存に失敗しました：' + err.message)
    }
  }

  // ---------------- 予約枠：カレンダー選択 ----------------
  let calViewYear, calViewMonth   // 表示中の年・月（0-indexed month）
  let selectedDates = new Set()   // 'YYYY-MM-DD' の集合
  let slotsCache = []             // 現在表示中の予約枠一覧（編集用）

  function pad2(n) { return String(n).padStart(2, '0') }
  function toDateStr(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}` }

  function renderCalendar() {
    const label = document.getElementById('cal-month-label')
    label.textContent = `${calViewYear}年 ${calViewMonth + 1}月`

    const grid = document.getElementById('cal-grid')
    const firstDay = new Date(calViewYear, calViewMonth, 1).getDay()
    const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate()

    const todayStr = toDateStr(new Date().getFullYear(), new Date().getMonth(), new Date().getDate())

    let html = ''
    for (let i = 0; i < firstDay; i++) {
      html += `<div class="cal-day empty-cell"></div>`
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = toDateStr(calViewYear, calViewMonth, d)
      const isPast = dateStr < todayStr
      const isToday = dateStr === todayStr
      const isSelected = selectedDates.has(dateStr)
      const cls = ['cal-day']
      if (isPast) cls.push('past')
      if (isToday) cls.push('today')
      if (isSelected) cls.push('selected')
      html += `<div class="${cls.join(' ')}" ${isPast ? '' : `onclick="calToggleDate('${dateStr}')"`}>${d}</div>`
    }
    grid.innerHTML = html
    document.getElementById('cal-selected-count').textContent = selectedDates.size
  }

  window.calShiftMonth = (diff) => {
    calViewMonth += diff
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear-- }
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++ }
    renderCalendar()
  }

  window.calToggleDate = (dateStr) => {
    if (selectedDates.has(dateStr)) {
      selectedDates.delete(dateStr)
    } else {
      selectedDates.add(dateStr)
    }
    renderCalendar()
  }

  window.calClearSelection = () => {
    selectedDates.clear()
    renderCalendar()
  }

  function fillExpSelects() {
    const opts = experiencesCache.map(e => `<option value="${e.id}">${e.タイトル}</option>`).join('')
    document.getElementById('slot-exp').innerHTML = opts
    document.getElementById('slot-filter-exp').innerHTML =
      '<option value="">すべての体験</option>' + opts
  }

  async function loadSlots() {
    const el = document.getElementById('slot-list')
    el.innerHTML = '<div class="empty">読み込み中...</div>'
    const month = document.getElementById('slot-month').value
    if (!month) return
    try {
      let slots = await adminGetSlots(month)
      const filterExp = document.getElementById('slot-filter-exp').value
      if (filterExp) slots = slots.filter(s => s.体験内容_id === filterExp)
      renderSlots(slots)
    } catch (err) {
      el.innerHTML = `<div class="empty">読み込みに失敗しました：${err.message}</div>`
    }
  }

  function renderSlots(slots) {
    slotsCache = slots
    const el = document.getElementById('slot-list')
    if (!slots || slots.length === 0) {
      el.innerHTML = '<div class="empty">この月の予約枠はまだありません</div>'
      return
    }
    el.innerHTML = slots.map(s => {
      const isFull = s.予約数 >= s.定員
      return `
        <div class="slot-row">
          <div class="date">${formatDate(s.日付)}</div>
          <div class="time">${(s.開始時刻 ?? '').slice(0,5)}${s.終了時刻 ? '〜' + s.終了時刻.slice(0,5) : ''}</div>
          <div class="exp-title">${s.タイトル ?? '(削除済み体験)'}</div>
          <div class="cap ${isFull ? 'full' : ''}">${s.予約数}/${s.定員}</div>
          <button class="btn btn-outline btn-small" onclick="openSlotEditForm('${s.slot_id}')">編集</button>
          <button class="btn btn-danger btn-small" onclick="deleteSlot('${s.slot_id}')">削除</button>
        </div>
      `
    }).join('')
  }

  function formatDate(dateStr) {
    if (!dateStr) return ''
    const d = new Date(dateStr + 'T00:00:00')
    const w = ['日','月','火','水','木','金','土'][d.getDay()]
    return `${d.getMonth()+1}/${d.getDate()}(${w})`
  }

  window.deleteSlot = async (id) => {
    if (!confirm('この予約枠を削除しますか？')) return
    try {
      await adminDeleteSlot(id)
      loadSlots()
    } catch (err) {
      alert('削除に失敗しました：' + err.message)
    }
  }

  window.openSlotEditForm = (id) => {
    const s = slotsCache.find(x => x.slot_id === id)
    if (!s) return
    document.getElementById('slot-edit-id').value = s.slot_id
    document.getElementById('slot-edit-exp-title').textContent = s.タイトル ?? '(削除済み体験)'
    document.getElementById('slot-edit-date').value = s.日付
    document.getElementById('slot-edit-start').value = (s.開始時刻 ?? '').slice(0,5)
    document.getElementById('slot-edit-end').value = s.終了時刻 ? s.終了時刻.slice(0,5) : ''
    document.getElementById('slot-edit-capacity').value = s.定員
    document.getElementById('slot-edit-modal-bg').classList.add('show')
  }

  window.closeSlotEditForm = () => {
    document.getElementById('slot-edit-modal-bg').classList.remove('show')
  }

  window.updateSlot = async () => {
    const id = document.getElementById('slot-edit-id').value
    const date = document.getElementById('slot-edit-date').value
    const start = document.getElementById('slot-edit-start').value
    const end = document.getElementById('slot-edit-end').value
    const capacity = parseInt(document.getElementById('slot-edit-capacity').value) || 1

    if (!date || !start) {
      alert('日付・開始時刻は必須です')
      return
    }

    try {
      await adminUpdateSlot(id, {
        date,
        startTime: start + ':00',
        endTime: end ? end + ':00' : null,
        capacity
      })
      closeSlotEditForm()
      loadSlots()
    } catch (err) {
      alert('更新に失敗しました：' + err.message)
    }
  }

  window.openSlotForm = () => {
    if (experiencesCache.length === 0) {
      alert('先に体験内容を登録してください')
      return
    }
    document.getElementById('slot-start').value = ''
    document.getElementById('slot-end').value = ''
    document.getElementById('slot-capacity').value = 1
    selectedDates.clear()

    const now = new Date()
    calViewYear = now.getFullYear()
    calViewMonth = now.getMonth()
    renderCalendar()

    document.getElementById('slot-modal-bg').classList.add('show')
  }

  window.closeSlotForm = () => {
    document.getElementById('slot-modal-bg').classList.remove('show')
  }

  window.saveSlot = async () => {
    const experienceId = document.getElementById('slot-exp').value
    const start = document.getElementById('slot-start').value
    const end = document.getElementById('slot-end').value
    const capacity = parseInt(document.getElementById('slot-capacity').value) || 1

    if (!experienceId || selectedDates.size === 0 || !start) {
      alert('体験・日付（1つ以上）・開始時刻は必須です')
      return
    }

    const dates = Array.from(selectedDates)
    const saveBtn = document.querySelector('#slot-modal-bg .btn-primary')
    saveBtn.disabled = true
    saveBtn.textContent = `登録中... (0/${dates.length})`

    let successCount = 0
    let failCount = 0

    for (const date of dates) {
      try {
        await adminInsertSlot({
          experienceId,
          date,
          startTime: start + ':00',
          endTime: end ? end + ':00' : null,
          capacity
        })
        successCount++
      } catch (err) {
        failCount++
        console.error(`${date} の登録に失敗:`, err)
      }
      saveBtn.textContent = `登録中... (${successCount + failCount}/${dates.length})`
    }

    saveBtn.disabled = false
    saveBtn.textContent = '選択した日に一括登録'

    if (failCount > 0) {
      alert(`${successCount}件登録しました（${failCount}件失敗）`)
    }

    closeSlotForm()
    loadSlots()
  }

  // ---------------- 担当者管理 ----------------
  window.openStaffForm = async (experienceId) => {
    const exp = experiencesCache.find(x => x.id === experienceId)
    document.getElementById('staff-exp-id').value = experienceId
    document.getElementById('staff-modal-title').textContent = `担当者を管理：${exp?.タイトル ?? ''}`
    document.getElementById('staff-modal-bg').classList.add('show')
    await refreshStaffList(experienceId)

    if (allUsersCache.length === 0) {
      try {
        allUsersCache = await adminGetUsers()
      } catch (err) {
        console.error(err)
      }
    }
  }

  async function refreshStaffList(experienceId) {
    const listEl = document.getElementById('staff-current-list')
    const selectEl = document.getElementById('staff-add-select')
    listEl.innerHTML = '<div class="empty">読み込み中...</div>'
    try {
      const staff = await adminGetStaffForExperience(experienceId)
      if (staff.length === 0) {
        listEl.innerHTML = '<div class="empty">担当者はまだいません</div>'
      } else {
        listEl.innerHTML = staff.map(s => `
          <div class="staff-chip">
            <span>${s.ユーザー名}</span>
            <button onclick="removeStaff('${experienceId}', '${s.user_id}')">解除</button>
          </div>
        `).join('')
      }

      if (allUsersCache.length === 0) {
        allUsersCache = await adminGetUsers()
      }
      const assignedIds = new Set(staff.map(s => s.user_id))
      const options = allUsersCache
        .filter(u => !assignedIds.has(u.id))
        .map(u => `<option value="${u.id}">${u.ユーザー名}（${u.権限 === 'admin' ? '管理者' : 'スタッフ'}）</option>`)
        .join('')
      selectEl.innerHTML = options || '<option value="">追加できるユーザーがいません</option>'
    } catch (err) {
      listEl.innerHTML = `<div class="empty">読み込みに失敗しました：${err.message}</div>`
    }
  }

  window.closeStaffForm = () => {
    document.getElementById('staff-modal-bg').classList.remove('show')
    loadExperiences()
  }

  window.addStaff = async () => {
    const experienceId = document.getElementById('staff-exp-id').value
    const userId = document.getElementById('staff-add-select').value
    if (!userId) { alert('追加するユーザーを選んでください'); return }
    try {
      await adminAssignStaff(experienceId, userId)
      await refreshStaffList(experienceId)
    } catch (err) {
      alert('追加に失敗しました：' + err.message)
    }
  }

  window.removeStaff = async (experienceId, userId) => {
    if (!confirm('この担当者を解除しますか？')) return
    try {
      await adminUnassignStaff(experienceId, userId)
      await refreshStaffList(experienceId)
    } catch (err) {
      alert('解除に失敗しました：' + err.message)
    }
  }

  // ---------------- 予約一覧 ----------------
  async function loadReservations() {
    const el = document.getElementById('res-list')
    const noteEl = document.getElementById('reservations-note')
    noteEl.textContent = currentUser.権限 === 'admin'
      ? 'すべての予約を表示しています'
      : '自分が担当する体験の予約のみ表示しています'
    el.innerHTML = '<div class="empty">読み込み中...</div>'
    try {
      const isAdmin = currentUser.権限 === 'admin'
      const reservations = await adminGetReservations(currentUser.id, isAdmin)
      if (reservations.length === 0) {
        el.innerHTML = '<div class="empty">予約はまだありません</div>'
        return
      }
      el.innerHTML = reservations.map(r => `
        <div class="res-row">
          <div class="date">${formatDate(r.日付)}</div>
          <div class="time">${(r.時間 ?? '').slice(0,5)}</div>
          <div class="exp-title">${r.タイトル ?? '(削除済み体験)'}</div>
          <div class="name">${r.氏名 ?? ''}${r.予約内容 ? '・' + r.予約内容 : ''}</div>
          <div class="count">${r.人数 ?? 1}名</div>
        </div>
      `).join('')
    } catch (err) {
      el.innerHTML = `<div class="empty">読み込みに失敗しました：${err.message}</div>`
    }
  }

  // ---------------- ユーザー管理（管理者のみ） ----------------
  async function loadUsers() {
    const el = document.getElementById('user-list')
    el.innerHTML = '<div class="empty">読み込み中...</div>'
    try {
      allUsersCache = await adminGetUsers()
      if (allUsersCache.length === 0) {
        el.innerHTML = '<div class="empty">ユーザーがまだいません</div>'
        return
      }
      el.innerHTML = allUsersCache.map(u => `
        <div class="user-row">
          <div class="info">
            <div class="name">${u.ユーザー名}<span class="role-badge ${u.権限}">${u.権限 === 'admin' ? '管理者' : 'スタッフ'}</span></div>
            <div class="meta">作成日：${formatDate(u.作成日?.slice(0,10))}</div>
          </div>
          <div class="actions">
            <button class="btn btn-outline btn-small" onclick="openResetPwForm('${u.id}', '${u.ユーザー名}')">パスワード変更</button>
            <button class="btn btn-danger btn-small" onclick="deleteUser('${u.id}')">削除</button>
          </div>
        </div>
      `).join('')
    } catch (err) {
      el.innerHTML = `<div class="empty">読み込みに失敗しました：${err.message}</div>`
    }
  }

  window.openUserForm = () => {
    document.getElementById('user-username').value = ''
    document.getElementById('user-password').value = ''
    document.getElementById('user-role').value = 'staff'
    document.getElementById('user-modal-bg').classList.add('show')
  }

  window.closeUserForm = () => {
    document.getElementById('user-modal-bg').classList.remove('show')
  }

  window.saveUser = async () => {
    const username = document.getElementById('user-username').value.trim()
    const password = document.getElementById('user-password').value
    const role = document.getElementById('user-role').value

    if (!username || !password) {
      alert('ユーザー名とパスワードは必須です')
      return
    }

    try {
      await adminCreateUser(username, password, role)
      closeUserForm()
      loadUsers()
    } catch (err) {
      alert('作成に失敗しました：' + err.message)
    }
  }

  window.deleteUser = async (id) => {
    if (id === currentUser.id) {
      alert('自分自身は削除できません')
      return
    }
    if (!confirm('このユーザーを削除しますか？')) return
    try {
      await adminDeleteUser(id)
      loadUsers()
    } catch (err) {
      alert('削除に失敗しました：' + err.message)
    }
  }

  window.openResetPwForm = (id, username) => {
    document.getElementById('reset-pw-user-id').value = id
    document.getElementById('reset-pw-username').textContent = username
    document.getElementById('reset-pw-new').value = ''
    document.getElementById('reset-pw-modal-bg').classList.add('show')
  }

  window.closeResetPwForm = () => {
    document.getElementById('reset-pw-modal-bg').classList.remove('show')
  }

  window.saveResetPassword = async () => {
    const id = document.getElementById('reset-pw-user-id').value
    const newPassword = document.getElementById('reset-pw-new').value
    if (!newPassword) { alert('新しいパスワードを入力してください'); return }
    try {
      await adminResetPassword(id, newPassword)
      closeResetPwForm()
      alert('パスワードを変更しました')
    } catch (err) {
      alert('変更に失敗しました：' + err.message)
    }
  }
</script>

</body>
</html>
