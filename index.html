  <!-- ヘッダー -->

  <!-- 予約中の体験 -->
  <div class="my-reservations" id="my-reservations-section" style="display:none;">
    <p class="section-title" style="text-align:left;padding:0 4px;margin-bottom:10px;">予約中の体験</p>

  <!-- ウェルカムメッセージ -->
  <div class="welcome">
    有福温泉がもっと楽しくなるコンテンツを集めました！<br>
    湯ったりとした素敵な1日をお過ごしください。
  </div>

  <!-- 開催中のイベント -->
  <div class="event-section" id="event-section" style="display:none;">
    <p class="section-title" style="text-align:left;padding:0 4px;margin-bottom:10px;">
      <svg width="14" height="14"><use href="#icon-calendar"/></svg> 開催予定・開催中のイベント
    </p>
    <div class="event-list" id="event-list"></div>
  </div>

  <!-- フィルター -->
  <div class="filter-section">
    <div class="filter-tabs">
      <button class="filter-tab-btn active" data-tab="duration">所要時間で選ぶ</button>
      <button class="filter-tab-btn" data-tab="date">開催日で選ぶ</button>
    </div>

    <div class="filter-wrap" id="filter-wrap-duration">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="5">〜5分</button>
      <button class="filter-btn" data-filter="30">〜30分</button>
      <button class="filter-btn" data-filter="60">1時間</button>
      <button class="filter-btn" data-filter="90">1時間30分</button>
    </div>

    <div class="filter-wrap" id="filter-wrap-date" style="display:none;">
      <button class="filter-btn" data-date-filter="today">本日</button>
      <button class="filter-btn" data-date-filter="thisweek">今週</button>
      <button class="filter-btn" data-date-filter="nextweek">来週</button>
    </div>
  </div>

  <!-- 体験メニュー一覧 -->
  <div class="card-section">
    <p class="section-title">体験メニュー一覧</p>
    <div class="card-list" id="card-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        読み込み中...
      </div>
    </div>
  </div>

  <script type="module">
    import { LIFF_ID } from './config.js'
    import { getMember, insertMember, getMemberStatus, getExperiences, getReservations, getActiveEvents, getExperiencesWithSlotsInRange } from './api.js'

    let allExperiences = []
    let currentFilterMode = 'duration'  // 'duration' or 'date'
    let currentFilter = 'all'           // 所要時間フィルター値
    let currentDateFilter = null        // 開催日フィルター値
    let dateFilteredExperiences = []    // 開催日フィルター時に使うキャッシュ

    // 所要時間→分数
    function parseDuration(str) {
      if (!str) return null
      const h = str.match(/(\d+)\s*時間/)
      const m = str.match(/(\d+)\s*分/)
      let total = 0
      if (h) total += parseInt(h[1]) * 60
      if (m) total += parseInt(m[1])
      return total || null
    }

    // 星表示（1〜5）
    function renderStars(count) {
      const n = Math.min(5, Math.max(0, count || 0))
      return '★'.repeat(n) + '☆'.repeat(5 - n)
    }

    function pad2(n) { return String(n).padStart(2, '0') }
    function toDateStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}` }

    // 開催日フィルターの期間を計算
    function getDateRange(key) {
      const today = new Date()
      today.setHours(0,0,0,0)

      if (key === 'today') {
        return [toDateStr(today), toDateStr(today)]
      }
      if (key === 'thisweek') {
        const end = new Date(today)
        end.setDate(end.getDate() + (6 - today.getDay()))
        return [toDateStr(today), toDateStr(end)]
      }
      if (key === 'nextweek') {
        const start = new Date(today)
        start.setDate(start.getDate() + (7 - today.getDay()))
        const end = new Date(start)
        end.setDate(end.getDate() + 6)
        return [toDateStr(start), toDateStr(end)]
      }
      return [toDateStr(today), toDateStr(today)]
    }

    // フィルター適用
    async function applyFilter() {
      if (currentFilterMode === 'duration') {
        let filtered = allExperiences
        if (currentFilter !== 'all') {
          const max = parseInt(currentFilter)
          filtered = allExperiences.filter(e => {
            const min = parseDuration(e.所要時間)
            if (min === null) return true
            return min <= max
          })
        }
        renderCards(filtered)
      } else {
        // 開催日フィルター
        if (!currentDateFilter) {
          renderCards(allExperiences)
          return
        }
        const el = document.getElementById('card-list')
        el.innerHTML = '<div class="loading"><div class="loading-spinner"></div>読み込み中...</div>'
        try {
          const [start, end] = getDateRange(currentDateFilter)
          dateFilteredExperiences = await getExperiencesWithSlotsInRange(start, end)
          renderCards(dateFilteredExperiences)
        } catch (err) {
          el.innerHTML = `<div class="error-msg">読み込みに失敗しました<br><small>${err.message}</small></div>`
        }
      }
    }

    // カード描画
    function renderCards(list) {
      const el = document.getElementById('card-list')
      if (!list || list.length === 0) {
        el.innerHTML = '<div class="empty-msg">該当する体験メニューがありません</div>'
        return
      }
      el.innerHTML = list.map(e => `
        <div class="card" onclick="openDetail('${e.experience_id}')">
          ${e.image_url
            ? `<img class="card-img" src="${e.image_url}" alt="${e.タイトル ?? ''}" loading="lazy">`
            : `<div class="card-img-placeholder"><svg width="32" height="32"><use href="#icon-onsen"/></svg></div>`
          }
          <div class="card-body">
            <p class="card-title">${e.タイトル ?? ''}</p>
            <p class="card-desc">${e.見出し説明 ?? ''}</p>
            <div class="card-meta">
              ${e.所要時間 ? `<span class="card-tag"><svg width="12" height="12"><use href="#icon-clock"/></svg> ${e.所要時間}</span>` : ''}
              ${e.体験場所 ? `<span class="card-tag"><svg width="12" height="12"><use href="#icon-pin"/></svg> ${e.体験場所}</span>` : ''}
              ${e.料金 != null ? `<span class="card-price">¥${e.料金.toLocaleString()}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('')
    }

    window.openDetail = (id) => {
      location.href = `detail.html?id=${encodeURIComponent(id)}`
    }

    function formatDateShort(dateStr) {
      if (!dateStr) return ''
      const d = new Date(dateStr + 'T00:00:00')
      const w = ['日','月','火','水','木','金','土'][d.getDay()]
      return `${d.getMonth()+1}/${d.getDate()}(${w})`
    }

    async function loadMyReservations(lineUserId) {
      try {
        const reservations = await getReservations(lineUserId)
        const todayStr = new Date().toISOString().slice(0, 10)
        const upcoming = (reservations ?? [])
          .filter(r => r.日付 >= todayStr)
          .sort((a, b) => (a.日付 ?? '').localeCompare(b.日付 ?? ''))

        const section = document.getElementById('my-reservations-section')
        if (upcoming.length === 0) {
          section.style.display = 'none'
          return
        }
        section.style.display = 'block'
        document.getElementById('my-res-list').innerHTML = upcoming.map(r => `
          <div class="my-res-card" onclick="location.href='mypage.html'">
            <div class="icon"><svg width="18" height="18"><use href="#icon-onsen"/></svg></div>
            <div class="info">
              <div class="title">${r.体験タイトル ?? '(体験情報なし)'}</div>
              <div class="meta">${formatDateShort(r.日付)} ${(r.時間 ?? '').slice(0,5)}・${r.人数 ?? 1}名</div>
            </div>
            <div class="arrow">›</div>
          </div>
        `).join('')
      } catch (err) {
        console.error('予約一覧の取得に失敗:', err)
      }
    }

    function formatDateRangeShort(startStr, endStr) {
      const fmt = (s) => {
        const d = new Date(s + 'T00:00:00')
        return `${d.getMonth()+1}/${d.getDate()}`
      }
      if (!endStr || startStr === endStr) return fmt(startStr)
      return `${fmt(startStr)}〜${fmt(endStr)}`
    }

    async function loadActiveEvents() {
      try {
        const events = await getActiveEvents()
        const section = document.getElementById('event-section')
        if (!events || events.length === 0) {
          section.style.display = 'none'
          return
        }
        section.style.display = 'block'
        document.getElementById('event-list').innerHTML = events.map(e => `
          <div class="event-card">
            ${e.image_url
              ? `<img src="${e.image_url}" alt="${e.タイトル ?? ''}">`
              : ''
            }
            <div class="event-card-body">
              <div class="title">${e.タイトル ?? ''}</div>
              <div class="period">${formatDateRangeShort(e.開始日, e.終了日)}</div>
              ${e.場所 ? `<div class="place">${e.場所}</div>` : ''}
            </div>
          </div>
        `).join('')
      } catch (err) {
        console.error('イベント取得に失敗:', err)
      }
    }

    function hideSplash() {
      const splash = document.getElementById('splash')
      if (splash) {
        splash.classList.add('hide')
        setTimeout(() => splash.remove(), 500)
      }
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID })

        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile()
          const lineUserId = profile.userId
          const displayName = profile.displayName

          // 会員登録（初回のみ）
          await insertMember(lineUserId, displayName)

          // 会員情報
          const member = await getMember(lineUserId)

          // 規約未同意なら利用規約ページへ
          if (!member?.規約同意済み) {
            location.href = 'terms.html'
            return
          }

          const name = member?.ユーザー名 ?? displayName
          document.getElementById('user-name').textContent = `${name} 様`

          // ステータス
          const status = await getMemberStatus(lineUserId)
          if (status) {
            document.getElementById('status-label').textContent = status.項目 ?? '新米住民'
            document.getElementById('status-stars').textContent = renderStars(status.星)
          }

          // 予約中の体験
          loadMyReservations(lineUserId)
        } else {
          liff.login()
          return
        }

        // 体験一覧
        allExperiences = await getExperiences()
        applyFilter()

        // 開催中のイベント
        loadActiveEvents()

        // スプラッシュを非表示
        hideSplash()

      } catch (err) {
        console.error(err)
        hideSplash()
        document.getElementById('card-list').innerHTML =
          `<div class="error-msg">読み込みに失敗しました<br><small>${err.message}</small></div>`
        document.body.insertAdjacentHTML('beforeend', `
          <div style="position:fixed;bottom:0;left:0;right:0;background:#c0392b;color:#fff;padding:16px;font-size:12px;z-index:9999;word-break:break-all;max-height:40vh;overflow:auto;">
            ❌ ${err.message}<br>${err.stack ?? ''}
          </div>
        `)
      }
    }

    // フィルタータブ切り替え（所要時間 / 開催日）
    document.querySelectorAll('.filter-tab-btn').forEach(tabBtn => {
      tabBtn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab-btn').forEach(b => b.classList.remove('active'))
        tabBtn.classList.add('active')
        currentFilterMode = tabBtn.dataset.tab

        document.getElementById('filter-wrap-duration').style.display =
          currentFilterMode === 'duration' ? 'flex' : 'none'
        document.getElementById('filter-wrap-date').style.display =
          currentFilterMode === 'date' ? 'flex' : 'none'

        applyFilter()
      })
    })

    // 所要時間フィルターボタン
    document.querySelectorAll('#filter-wrap-duration .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#filter-wrap-duration .filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentFilter = btn.dataset.filter
        applyFilter()
      })
    })

    // 開催日フィルターボタン
    document.querySelectorAll('#filter-wrap-date .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#filter-wrap-date .filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentDateFilter = btn.dataset.dateFilter
        applyFilter()
      })
    })

    main()
  </script>

</body>
</html>
