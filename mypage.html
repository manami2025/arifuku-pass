<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | 有福温泉 ARIFUKU PASS</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background: #e8e4dc;
      color: #2c2c2c;
      min-height: 100vh;
    }

    .header {
      background: #e8e4dc;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #fff;
      border: none;
      font-size: 16px;
      color: #3d6b4f;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #3d6b4f;
    }

    .content { padding: 8px 16px 32px; }

    .res-card {
      background: #fff;
      border: 1.5px solid #d6d0c4;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .res-card .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .res-card .exp-title {
      font-size: 15px;
      font-weight: 700;
    }
    .res-card .date-badge {
      background: #f0ebe4;
      color: #3d6b4f;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .res-card .detail-row {
      font-size: 12px;
      color: #666;
      margin-bottom: 3px;
    }
    .res-card .cancel-btn {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1.5px solid #e0a8a0;
      background: #fff;
      color: #c0392b;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #a08878;
      font-size: 13px;
    }
    .loading { text-align: center; padding: 60px 20px; color: #a08878; font-size: 13px; }

    .toast {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: #2c2c2c;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 100;
      display: none;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">‹</button>
    <span class="header-title">マイページ — 予約一覧</span>
  </div>

  <div class="content" id="content">
    <div class="loading">読み込み中...</div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module">
  import { LIFF_ID } from './config.js'
  import { getMember, insertMember, getReservations, cancelReservation } from './api.js'

  let lineUserId = null

  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2500)
  }

  function formatDate(dateStr) {
    if (!dateStr) return ''
    const d = new Date(dateStr + 'T00:00:00')
    const w = ['日','月','火','水','木','金','土'][d.getDay()]
    return `${d.getMonth()+1}/${d.getDate()}(${w})`
  }

  async function loadReservations() {
    const el = document.getElementById('content')
    try {
      const reservations = await getReservations(lineUserId)
      if (!reservations || reservations.length === 0) {
        el.innerHTML = '<div class="empty">予約はまだありません</div>'
        return
      }
      // 日付が新しい順はAPI側でDESCなので、未来の予約を見やすく日付昇順に並べ替え
      const sorted = [...reservations].sort((a, b) => (a.日付 ?? '').localeCompare(b.日付 ?? ''))

      el.innerHTML = sorted.map(r => `
        <div class="res-card">
          <div class="top-row">
            <span class="exp-title">${r.体験タイトル ?? '(体験情報なし)'}</span>
            <span class="date-badge">${formatDate(r.日付)} ${(r.時間 ?? '').slice(0,5)}</span>
          </div>
          <div class="detail-row">お名前：${r.氏名 ?? ''}</div>
          <div class="detail-row">人数：${r.人数 ?? 1}名</div>
          <button class="cancel-btn" onclick="doCancel('${r.reservation_id}')">この予約をキャンセル</button>
        </div>
      `).join('')
    } catch (err) {
      el.innerHTML = `<div class="empty">読み込みに失敗しました<br><small>${err.message}</small></div>`
    }
  }

  window.doCancel = async (reservationId) => {
    if (!confirm('この予約をキャンセルしますか？')) return
    try {
      await cancelReservation(reservationId, lineUserId)
      showToast('予約をキャンセルしました')
      loadReservations()
    } catch (err) {
      showToast('キャンセルに失敗しました：' + err.message)
    }
  }

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID })
      if (!liff.isLoggedIn()) { liff.login(); return }

      const profile = await liff.getProfile()
      lineUserId = profile.userId
      await insertMember(lineUserId, profile.displayName)

      loadReservations()
    } catch (err) {
      document.getElementById('content').innerHTML =
        `<div class="empty">読み込みに失敗しました<br><small>${err.message}</small></div>`
    }
  }

  main()
</script>

</body>
</html>
